<div class="bg-white min-h-screen py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-7xl mx-auto">
        <div class="text-center animate-fade-in">
            <h2 class="text-3xl font-extrabold text-gray-900 sm:text-4xl">Upcoming Events</h2>
            <p class="mt-4 text-lg text-gray-500">Join us for these exciting events and activities.</p>
        </div>

        <!-- Error Message -->
        <div *ngIf="error"
            class="mt-8 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative animate-fade-in"
            role="alert">
            <strong class="font-bold">Error!</strong>
            <span class="block sm:inline"> {{ error }}</span>
        </div>

        <!-- Loading State -->
        <div *ngIf="loading" class="mt-8 text-center animate-fade-in">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
            <p class="mt-4 text-gray-600">Loading events...</p>
        </div>

        <!-- Category Filter -->
        <div *ngIf="!loading && !error" class="mt-8 flex justify-center animate-slide-up">
            <div class="inline-flex rounded-md shadow-sm" role="group">
                <button *ngFor="let category of categories" type="button"
                    (click)="selectedCategory = category; filterEvents()"
                    [class.bg-indigo-600]="selectedCategory === category"
                    [class.!text-white]="selectedCategory === category" [class.bg-white]="selectedCategory !== category"
                    [class.text-gray-700]="selectedCategory !== category"
                    class="px-4 py-2 text-sm font-medium border border-gray-200 hover:bg-indigo-50 focus:z-10 focus:ring-2 focus:ring-indigo-500 focus:text-indigo-600 first:rounded-l-lg last:rounded-r-lg transition-colors duration-200">
                    {{ category }}
                </button>
            </div>
        </div>

        <!-- Events Grid - Simplified Condition -->
        <div *ngIf="filteredEvents.length > 0" class="mt-12 grid gap-8 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
            <div *ngFor="let event of filteredEvents; let i = index"
                class="flex flex-col rounded-lg shadow-lg overflow-hidden hover-lift animate-scale-in"
                [style.animation-delay]="i * 0.1 + 's'">
                <div class="flex-shrink-0">
                    <img class="h-48 w-full object-cover" [src]="event.imageUrl" [alt]="event.title">
                </div>
                <div class="flex-1 bg-white p-6 flex flex-col justify-between">
                    <div class="flex-1">
                        <p class="text-sm font-medium text-indigo-600">
                            {{ event.category }}
                        </p>
                        <div class="block mt-2">
                            <p class="text-xl font-semibold text-gray-900">{{ event.title }}</p>
                            <p class="mt-3 text-base text-gray-500">{{ event.description }}</p>
                        </div>
                    </div>
                    <div class="mt-6 flex items-center">
                        <div class="flex-shrink-0">
                            <span class="sr-only">Date</span>
                            <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                                fill="currentColor" aria-hidden="true">
                                <path fill-rule="evenodd"
                                    d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z"
                                    clip-rule="evenodd" />
                            </svg>
                        </div>
                        <div class="ml-3">
                            <p class="text-sm font-medium text-gray-900">
                                {{ event.date | date:'fullDate' }}
                            </p>
                            <p class="text-sm text-gray-500">
                                {{ event.location }}
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- No Events Message -->
        <div *ngIf="!loading && !error && filteredEvents.length === 0" class="mt-12 text-center">
            <p class="text-gray-500">No events found in this category.</p>
        </div>
    </div>
</div>
