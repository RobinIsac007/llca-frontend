<div class="p-8">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Manage Events</h1>
    </div>

    <!-- Success Message -->
    <div *ngIf="successMessage" class="mb-4 rounded-lg bg-green-50 border border-green-200 p-4 animate-fade-in">
        <p class="text-sm font-medium text-green-800">{{ successMessage }}</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="mb-4 rounded-lg bg-red-50 border border-red-200 p-4 animate-fade-in">
        <p class="text-sm font-medium text-red-800">{{ errorMessage }}</p>
    </div>

    <!-- Add Button -->
    <div class="mb-6">
        <button *ngIf="!showForm" (click)="showAddForm()"
            class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700">
            Add New Event
        </button>
    </div>

    <!-- Form -->
    <div *ngIf="showForm" class="bg-white shadow rounded-lg p-6 mb-6">
        <h2 class="text-xl font-bold mb-4">{{ isEditing ? 'Edit Event' : 'Add New Event' }}</h2>
        <form (ngSubmit)="saveEvent()" class="space-y-4">
            <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Title *</label>
                    <input [(ngModel)]="currentEvent.title" name="title" required
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Date *</label>
                    <input type="datetime-local" [(ngModel)]="currentEvent.date" name="date" required
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Description</label>
                <textarea [(ngModel)]="currentEvent.description" name="description" rows="3"
                    class="mt-1 block w-full border border-gray-300 rounded-md p-2"></textarea>
            </div>

            <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Location</label>
                    <input [(ngModel)]="currentEvent.location" name="location"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Category</label>
                    <input [(ngModel)]="currentEvent.category" name="category"
                        class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                </div>
            </div>

            <!-- Photo Upload -->
            <div>
                <label class="block text-sm font-medium text-gray-700">Event Photo</label>
                <div class="mt-1 flex items-center space-x-4">
                    <div *ngIf="photoPreview"
                        class="relative w-24 h-24 rounded-lg overflow-hidden border border-gray-300">
                        <img [src]="photoPreview" class="w-full h-full object-cover">
                        <button type="button" (click)="photoPreview = null; selectedFile = null"
                            class="absolute top-0 right-0 bg-red-500 text-white rounded-bl-lg p-1 hover:bg-red-600 transition">
                            <span class="material-icons text-xs">close</span>
                        </button>
                    </div>
                    <input type="file" (change)="onFileSelected($event)" accept="image/*"
                        class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                </div>
            </div>

            <div class="flex justify-end space-x-2 pt-4">
                <button type="button" (click)="cancelForm()" class="px-4 py-2 border rounded-md">Cancel</button>
                <button type="submit" [disabled]="isLoading" class="px-4 py-2 bg-indigo-600 text-white rounded-md">
                    {{ isLoading ? 'Saving...' : 'Save' }}
                </button>
            </div>
        </form>
    </div>

    <!-- Events Table -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        Title</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        Date</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        Location</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        Category</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        Actions</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr *ngFor="let event of events" class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ event.title }}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ event.date | date:'short' }}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ event.location }}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span
                            class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">
                            {{ event.category }}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button (click)="editEvent(event)"
                            class="text-indigo-600 hover:text-indigo-900 mr-4">Edit</button>
                        <button (click)="deleteEvent(event.id!)" class="text-red-600 hover:text-red-900">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
        <div *ngIf="events.length === 0 && !isLoading" class="p-8 text-center text-gray-500">
            No events found.
        </div>
    </div>
</div>
