<div class="p-8">
    <h1 class="text-3xl font-bold text-gray-900 mb-8">Manage Admissions</h1>

    <!-- Admissions Table -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        Name</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        Email</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        Date</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        Status</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        Actions</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr *ngFor="let admission of admissions" class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ admission.name
                        }}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ admission.email }}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ admission.date }}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full" [ngClass]="{
                'bg-yellow-100 text-yellow-800': admission.status === 'Pending',
                'bg-green-100 text-green-800': admission.status === 'Approved',
                'bg-red-100 text-red-800': admission.status === 'Rejected'
              }">
                            {{ admission.status }}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button (click)="updateStatus(admission.id, 'Approved')"
                            class="text-green-600 hover:text-green-900 mr-4">Approve</button>
                        <button (click)="updateStatus(admission.id, 'Rejected')"
                            class="text-red-600 hover:text-red-900">Reject</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
