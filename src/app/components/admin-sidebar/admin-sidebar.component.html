<div class="h-screen w-64 bg-royal-blue text-white flex flex-col shadow-xl fixed left-0 top-0 z-50">
    <!-- Header / Logo -->
    <div class="p-6 border-b border-white/20">
        <h1 class="text-2xl font-bold">LLCA Admin</h1>
        <p class="text-sm opacity-70">Church Manager</p>
    </div>

    <!-- Navigation Links -->
    <nav class="flex-1 py-6 px-4 space-y-2">
        <a routerLink="/admin" routerLinkActive="bg-white/20 font-semibold" [routerLinkActiveOptions]="{exact: true}"
            class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10 transition-colors">
            <span class="material-icons text-xl">dashboard</span>
            <span>Dashboard</span>
        </a>

        <a routerLink="/admin/pastors" routerLinkActive="bg-white/20 font-semibold"
            class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10 transition-colors">
            <span class="material-icons text-xl">people</span>
            <span>Pastors</span>
        </a>

        <a routerLink="/admin/events" routerLinkActive="bg-white/20 font-semibold"
            class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10 transition-colors">
            <span class="material-icons text-xl">event</span>
            <span>Events</span>
        </a>

        <a routerLink="/admin/ministries" routerLinkActive="bg-white/20 font-semibold"
            class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10 transition-colors">
            <span class="material-icons text-xl">volunteer_activism</span>
            <span>Ministries</span>
        </a>

        <a routerLink="/admin/admissions" routerLinkActive="bg-white/20 font-semibold"
            class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10 transition-colors">
            <span class="material-icons text-xl">school</span>
            <span>Admissions</span>
        </a>
    </nav>

    <!-- Footer / Logout -->
    <div class="p-4 border-t border-white/20">
        <button (click)="logout()"
            class="w-full flex items-center justify-center space-x-2 px-4 py-2 border border-white/30 rounded-lg hover:bg-white/10 transition-colors text-sm">
            <span class="material-icons text-base">logout</span>
            <span>Sign Out</span>
        </button>
    </div>
</div>
